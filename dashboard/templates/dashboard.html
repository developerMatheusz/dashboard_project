<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://themewagon.github.io/windster/app.css"
    />
  </head>

  <body class="bg-gray-50 p-6">

    <h2 class="text-xl font-bold mb-4">Tabela dinâmica</h2>

    <table class="min-w-full divide-y divide-gray-200 bg-white shadow rounded">
      <thead class="bg-gray-50">
        <tr id="table-head"></tr>
      </thead>
      <tbody id="pedidos-table" class="bg-white"></tbody>
    </table>

    <script>
      async function carregarPedidos() {
        try {
          const response = await fetch("/falcon/api/pedidos/");
          const dados = await response.json();

          const tabela = document.getElementById("pedidos-table");
          const thead = document.getElementById("table-head");

          tabela.innerHTML = "";
          thead.innerHTML = "";

          if (dados.length === 0) return;

          const colunas = Object.keys(dados[0]);

          colunas.forEach(col => {
            thead.innerHTML += `
              <th class="p-4 text-left text-xs font-medium text-gray-500 uppercase">
                ${col}
              </th>
            `;
          });

          dados.forEach(row => {
            let linha = `<tr class="border-b">`;

            colunas.forEach(col => {
              linha += `
                <td class="p-4 text-sm text-gray-900">
                  ${row[col] ?? ''}
                </td>
              `;
            });

            linha += `</tr>`;
            tabela.innerHTML += linha;
          });

        } catch (erro) {
          console.error("Erro ao carregar dados:", erro);
        }
      }

      carregarPedidos();
    </script>

  </body>
</html>
